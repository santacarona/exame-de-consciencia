                "primary-dim": "#CC3E00",
                "accent-light": "#D4C5A9",

    <style>
      /* Global Reset & Base */
      body {
        background-color: #0D0D0D;
        color: #F0EAD6;

      }

      ::-webkit-scrollbar {

      }
